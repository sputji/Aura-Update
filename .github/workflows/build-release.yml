# ─────────────────────────────────────────────────────────────
# Aura Update v2.2.5 — Script Ultime de Production
# Build multi-OS + GitHub Release automatique
# Déclenché : push tag v*  |  bouton manuel
# ─────────────────────────────────────────────────────────────
name: "Build & Release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "20"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  # ════════════════════════════════════════════════════════════
  # Windows x64 — MSI + NSIS
  # ════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci || npm install

      - name: Build Tauri (Windows)
        run: npx tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          retention-days: 5
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*setup*.exe
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/release/bundle/**/latest*.json

  # ════════════════════════════════════════════════════════════
  # macOS Universal (arm64 + x86_64)
  # ════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci || npm install

      - name: Build Tauri (macOS Universal)
        run: npx tauri build --target universal-apple-darwin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          retention-days: 5
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.sig
            src-tauri/target/universal-apple-darwin/release/bundle/**/latest*.json

  # ════════════════════════════════════════════════════════════
  # Linux x86_64 — .deb + .rpm + AppImage
  # ════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci || npm install

      - name: Build Tauri (Linux)
        run: npx tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          retention-days: 5
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/release/bundle/**/latest*.json

  # ════════════════════════════════════════════════════════════
  # Release — Publie tout sur GitHub Releases
  # ════════════════════════════════════════════════════════════
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: List artifacts
        run: find dist -type f | head -30

      - name: Build updater.json from latest metadata
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Helper: lit signature .sig si pr\u00e9sente, sinon cha\u00eene vide
          read_sig() {
            local sig_file="$1"
            [ -f "${sig_file}" ] && cat "${sig_file}" || echo ""
          }

          # D\u00e9tection des artefacts par plateforme
          win_msi=$(find dist -type f -name "*.msi" | head -n1 || true)
          win_nsis=$(find dist -type f -name "*setup*.exe" | head -n1 || true)
          mac_dmg=$(find dist -type f -name "*.dmg" | head -n1 || true)
          mac_app_tar=$(find dist -type f -name "*.app.tar.gz" | head -n1 || true)
          linux_appimage=$(find dist -type f -name "*.AppImage" | head -n1 || true)
          linux_deb=$(find dist -type f -name "*.deb" | head -n1 || true)

          # Construction des plateformes
          platforms="{}"

          add_platform() {
            local key="$1" file="$2"
            [ -z "${file}" ] && return 0
            local fname=$(basename "${file}")
            local sig=$(read_sig "${file}.sig")
            local url="https://github.com/sputji/Aura-Update/releases/download/${GITHUB_REF_NAME}/${fname}"
            platforms=$(jq --arg k "${key}" --arg s "${sig}" --arg u "${url}" \
              '. + {($k): {signature: $s, url: $u}}' <<< "${platforms}")
          }

          # Cl\u00e9s plateformes attendues par tauri-plugin-updater
          add_platform "windows-x86_64"        "${win_nsis:-${win_msi}}"
          add_platform "windows-x86_64-nsis"   "${win_nsis}"
          add_platform "windows-x86_64-msi"    "${win_msi}"
          add_platform "darwin-aarch64"        "${mac_app_tar:-${mac_dmg}}"
          add_platform "darwin-x86_64"         "${mac_app_tar:-${mac_dmg}}"
          add_platform "darwin-universal"      "${mac_app_tar:-${mac_dmg}}"
          add_platform "linux-x86_64"          "${linux_appimage:-${linux_deb}}"

          jq -n --arg v "${version}" --arg n "Release ${GITHUB_REF_NAME}" --arg d "${pub_date}" --argjson p "${platforms}" \
            '{version:$v, notes:$n, pub_date:$d, platforms:$p}' > dist/updater.json

          echo "=== updater.json ==="
          cat dist/updater.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Aura Update ${{ github.ref_name }}"
          draft: false
          generate_release_notes: true
          files: |
            dist/**/*.exe
            dist/**/*.msi
            dist/**/*.dmg
            dist/**/*.deb
            dist/**/*.rpm
            dist/**/*.AppImage
            dist/**/*.sig
            dist/updater.json
            dist/**/latest*.json
            dist/updater.json

name: Sortie de Production Aura Update v2.2

on:
  push:
    tags:
      - 'v*' # Se déclenche uniquement quand tu crées un tag (ex: v2.2.0)

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installation Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Dépendances Linux
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Installation des paquets NPM (Terser, etc.)
        run: npm install

      - name: Lecture du README pour la Release
        id: get_readme
        shell: bash
        run: |
          # Lit le README.md pour l'insérer dans la note de version
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "notes<<$EOF" >> $GITHUB_OUTPUT
          cat README.md >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Build & Publish Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-${{ github.ref_name }}
          releaseName: 'Aura-Update ${{ github.ref_name }}'
          releaseBody: ${{ steps.get_readme.outputs.notes }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

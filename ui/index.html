<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title id="appTitle">Aura-Update</title>
<link rel="stylesheet" href="app.css" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; img-src 'self' data:;">
<link rel="icon" type="image/x-icon" href="favicon.ico" />
</head>
<body>
  <header class="brand">
    <div class="brand-left">
        <div class="logo">
            <img src="favicon.ico" alt="Aura-Update" class="logoimg" />
        </div>
        <div>
            <h1 id="headerTitle">Aura-Update</h1>
            <p class="sub" id="headerSub">v0.3.0</p>
        </div>
    </div>
    <div class="actions">
      <!-- Sélecteur de langue -->
      <button id="langToggle" title="Changer la langue / Change Language" style="font-size: 18px;">🇫🇷</button>
      
      <button id="adminMode" class="admin" title="Mode Administrateur">
        <span id="adminIcon">🛡️</span> <span id="adminText">Admin</span>
      </button>
      <button id="refresh">🔄 Vérifier</button>
      <button id="updateAll" class="primary">⬇️ Tout Mettre à Jour</button>
    </div>
  </header>
  
  <main>
    <section id="adminWarning" class="card warning" style="display:none">
      <div>
          <strong id="warnTitle">⚠️ Mode Administrateur requis</strong>
          <p id="warnDesc" style="margin: 4px 0 0 0; font-size: 14px; opacity: 0.8;">Certaines mises à jour nécessitent des privilèges élevés pour s'installer correctement.</p>
      </div>
      <button id="elevateBtn" class="small-btn">Relancer en Admin</button>
    </section>

    <section id="status" class="card">
        <div style="font-size: 48px; margin-bottom: 16px;" id="statusIcon">👋</div>
        <div id="statusTitle">Bienvenue sur Aura-Update</div>
        <div id="statusDesc" style="font-size: 14px; opacity: 0.6; margin-top: 8px;">Cliquez sur "Vérifier" pour rechercher des mises à jour.</div>
    </section>

    <section id="progress" class="card" aria-hidden="true" style="display:none">
      <div style="display: flex; justify-content: space-between; align-items: baseline;">
          <strong id="progressLabel">Traitement en cours...</strong>
          <span id="progressPercent" style="font-size: 12px; color: var(--muted);">0%</span>
      </div>
      <div class="barwrap">
        <div class="bar" id="progressBar" style="width:0%"></div>
      </div>
      <div id="progressMessage" class="small">Initialisation...</div>
    </section>

    <div id="list">
        <!-- Les items seront injectés ici -->
    </div>
  </main>
  
  <script src="app.js"></script>
</body>
</html>

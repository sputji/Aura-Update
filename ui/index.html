<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title id="appTitle">Aura-Update</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="app.css" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data:;">
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
</head>
<body>

<header class="brand">
    <div class="brand-left">
        <div class="logo">
            <img src="favicon.ico" alt="Logo" class="logoimg" />
        </div>
        <div>
            <h1 id="headerTitle">Aura-Update</h1>
            <p class="sub" id="headerSub">Loading...</p>
        </div>
    </div>

    <div class="actions">
        <button id="langToggle" title="Langue">🇫🇷</button>

        <button id="adminMode" class="admin" title="Mode Administrateur">
            <span id="adminIcon">🛡️</span> <span id="adminText">Admin</span>
        </button>

        <button id="refresh">🔄 Vérifier</button>

        <button id="updateAll" class="primary">
            <span>⬇️ Tout Mettre à Jour</span>
        </button>
    </div>
</header>

<main>
    <section id="adminWarning" class="card warning" style="display:none">
        <div style="flex: 1;">
            <strong id="warnTitle">⚠️ Mode Administrateur requis</strong>
            <p id="warnDesc" style="margin: 4px 0 0 0; font-size: 14px; opacity: 0.8;">Certaines mises à jour nécessitent des privilèges élevés.</p>
        </div>
        <button id="elevateBtn" class="small-btn">Relancer en Admin</button>
    </section>

    <section id="status" class="card">
        <div id="statusIcon">👋</div>
        <div id="statusTitle">Bienvenue sur Aura-Update</div>
        <div id="statusDesc" style="font-size: 14px; opacity: 0.6; margin-top: 8px;">Cliquez sur "Vérifier" pour rechercher des mises à jour.</div>
    </section>

    <section id="progress" class="card" aria-hidden="true" style="display:none">
        <div style="display: flex; justify-content: space-between; align-items: baseline;">
            <strong id="progressLabel">Traitement en cours...</strong>
            <span id="progressPercent" style="font-size: 13px; color: var(--accent); font-weight: 600;">0%</span>
        </div>
        <div class="barwrap">
            <div class="bar" id="progressBar" style="width:0%"></div>
        </div>
        <div id="progressMessage" style="margin-top: 8px; font-size: 12px; color: var(--muted); font-family: monospace;">Initialisation...</div>
    </section>

    <div id="list">
    </div>
</main>

<script src="app.js"></script>
</body>
</html>
